      <text x="115" y="50" text-anchor="middle" fill="#dcfce7" font-size="24" font-weight="700">Schedule</text>
      <text x="115" y="84" text-anchor="middle" fill="#94a3b8" font-size="16">Hermes cron</text>
    </g>
    <g transform="translate(1020 316)">
      <rect width="230" height="120" rx="22" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
      <text x="115" y="50" text-anchor="middle" fill="#ede9fe" font-size="24" font-weight="700">State</text>
      <text x="115" y="84" text-anchor="middle" fill="#94a3b8" font-size="16">JSON / wiki / board</text>
    </g>
