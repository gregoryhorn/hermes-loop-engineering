  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#grid)" opacity="0.6"/>
  <rect width="1600" height="840" fill="url(#glow)"/>

  <text x="96" y="142" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="76" font-weight="800">Hermes Loop Engineering</text>
