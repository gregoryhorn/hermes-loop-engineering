<svg width="1600" height="840" viewBox="0 0 1600 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Loop Engineering</title>
  <desc id="desc">A polished technical banner for safe scheduled Hermes Agent loops with durable state, verification, and human gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="840">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2edf3"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#07111f"/>
      <stop offset="1" stop-color="#102033"/>
    </linearGradient>
    <linearGradient id="accent" x1="420" y1="150" x2="1220" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0891b2"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <pattern id="fineGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#cbd5e1" stroke-width="1" opacity="0.45" fill="none"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#0891b2"/>
    </marker>
  </defs>

  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#fineGrid)" opacity="0.55"/>
  <circle cx="1330" cy="-80" r="360" fill="#bae6fd" opacity="0.5"/>
  <circle cx="-80" cy="760" r="300" fill="#ccfbf1" opacity="0.55"/>

  <g transform="translate(96 86)">
    <rect width="176" height="38" rx="19" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="88" y="25" text-anchor="middle" fill="#155e75" font-family="DejaVu Sans" font-size="14" font-weight="800">HERMES LOOPS</text>
    <text x="0" y="118" fill="#07111f" font-family="DejaVu Sans" font-size="76" font-weight="800">Loop Engineering</text>
    <text x="2" y="168" fill="#334155" font-family="DejaVu Sans" font-size="29" font-weight="500">Design safe, scheduled AI-agent workflows with state, evidence, and human gates.</text>
  </g>

  <g transform="translate(108 308)" filter="url(#softShadow)">
    <rect width="1384" height="330" rx="32" fill="#ffffff" stroke="#cbd5e1"/>
    <path d="M178 164H352" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M490 164H664" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M802 164H976" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1148 216C1110 278 1018 294 931 268C804 230 736 232 610 268C480 305 342 286 258 217" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 10" fill="none" opacity="0.75" marker-end="url(#arrow)"/>

    <g transform="translate(42 72)">
      <circle cx="86" cy="92" r="68" fill="#f0fdff" stroke="#0891b2" stroke-width="2"/>
      <text x="86" y="80" text-anchor="middle" fill="#0f172a" font-family="DejaVu Sans" font-size="22" font-weight="800">Plan</text>
      <text x="86" y="108" text-anchor="middle" fill="#64748b" font-family="DejaVu Sans" font-size="14">prompt + scope</text>
    </g>
    <g transform="translate(354 72)">
      <circle cx="86" cy="92" r="68" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
      <text x="86" y="80" text-anchor="middle" fill="#0f172a" font-family="DejaVu Sans" font-size="22" font-weight="800">Run</text>
      <text x="86" y="108" text-anchor="middle" fill="#64748b" font-family="DejaVu Sans" font-size="14">cron cadence</text>
    </g>
    <g transform="translate(666 72)">
      <circle cx="86" cy="92" r="68" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <text x="86" y="80" text-anchor="middle" fill="#0f172a" font-family="DejaVu Sans" font-size="22" font-weight="800">State</text>
      <text x="86" y="108" text-anchor="middle" fill="#64748b" font-family="DejaVu Sans" font-size="14">JSON + notes</text>
    </g>
    <g transform="translate(978 72)">
      <circle cx="86" cy="92" r="68" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
      <text x="86" y="80" text-anchor="middle" fill="#0f172a" font-family="DejaVu Sans" font-size="22" font-weight="800">Verify</text>
      <text x="86" y="108" text-anchor="middle" fill="#64748b" font-family="DejaVu Sans" font-size="14">tests + proof</text>
    </g>
    <g transform="translate(1194 48)">
      <rect width="142" height="232" rx="26" fill="#07111f"/>
      <path d="M46 103l18 18 34-51" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="71" y="158" text-anchor="middle" fill="#f8fafc" font-family="DejaVu Sans" font-size="23" font-weight="800">Gate</text>
      <text x="71" y="188" text-anchor="middle" fill="#cbd5e1" font-family="DejaVu Sans" font-size="14">approve or pause</text>
    </g>
  </g>

  <g transform="translate(112 700)">
    <rect width="260" height="54" rx="27" fill="#07111f"/>
    <text x="130" y="35" text-anchor="middle" fill="#f8fafc" font-family="DejaVu Sans" font-size="17" font-weight="800">L1 REPORT-FIRST</text>
    <rect x="286" width="260" height="54" rx="27" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="416" y="35" text-anchor="middle" fill="#155e75" font-family="DejaVu Sans" font-size="17" font-weight="800">LOW-NOISE ALERTS</text>
    <rect x="572" width="260" height="54" rx="27" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="702" y="35" text-anchor="middle" fill="#1e40af" font-family="DejaVu Sans" font-size="17" font-weight="800">DURABLE STATE</text>
    <rect x="858" width="292" height="54" rx="27" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="1004" y="35" text-anchor="middle" fill="#334155" font-family="DejaVu Sans" font-size="17" font-weight="800">VERIFIED ACTIONS</text>
  </g>
