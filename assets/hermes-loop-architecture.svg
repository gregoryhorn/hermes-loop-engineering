<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hermes loop architecture</title>
  <desc id="desc">A recurring Hermes Agent loop from runbook to schedule, state, tools, verification, reporting, and human approval.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1400" y2="900">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf6fb"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#0891b2"/>
    </marker>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#dbe7ef" stroke-width="1" fill="none"/>
    </pattern>
  </defs>

  <rect width="1400" height="900" fill="url(#page)"/>
  <rect width="1400" height="900" fill="url(#grid)" opacity="0.7"/>

  <g transform="translate(80 62)">
    <text x="0" y="0" dominant-baseline="hanging" fill="#07111f" font-family="DejaVu Sans" font-size="42" font-weight="800">Hermes loop architecture</text>
    <text x="0" y="62" fill="#475569" font-family="DejaVu Sans" font-size="20">A recurring agent workflow with durable state, low-noise reporting, verification evidence, and human gates.</text>
  </g>

  <g transform="translate(90 170)" filter="url(#shadow)">
    <rect width="1220" height="560" rx="34" fill="#ffffff" stroke="#cbd5e1"/>

    <path d="M204 136H388" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M574 136H758" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M944 136H1050V260" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
    <path d="M1050 394V436H944" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
    <path d="M758 436H574" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M388 436H204V210" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

    <g font-family="DejaVu Sans">
      <g transform="translate(72 72)">
        <rect width="210" height="128" rx="22" fill="#ecfeff" stroke="#67e8f9"/>
        <text x="24" y="44" fill="#0f172a" font-size="23" font-weight="800">Runbook</text>
        <text x="24" y="76" fill="#475569" font-size="15">Purpose, scope,</text>
        <text x="24" y="98" fill="#475569" font-size="15">non-goals, kill switch</text>
      </g>
      <g transform="translate(442 72)">
        <rect width="210" height="128" rx="22" fill="#f0fdfa" stroke="#5eead4"/>
        <text x="24" y="44" fill="#0f172a" font-size="23" font-weight="800">Schedule</text>
        <text x="24" y="76" fill="#475569" font-size="15">Hermes cron, cadence,</text>
        <text x="24" y="98" fill="#475569" font-size="15">delivery rule</text>
      </g>
      <g transform="translate(812 72)">
        <rect width="210" height="128" rx="22" fill="#eff6ff" stroke="#93c5fd"/>
        <text x="24" y="44" fill="#0f172a" font-size="23" font-weight="800">State</text>
        <text x="24" y="76" fill="#475569" font-size="15">JSON or Markdown</text>
        <text x="24" y="98" fill="#475569" font-size="15">outside the chat</text>
      </g>
      <g transform="translate(952 272)">
        <rect width="210" height="128" rx="22" fill="#f8fafc" stroke="#94a3b8"/>
        <text x="24" y="44" fill="#0f172a" font-size="23" font-weight="800">Tools</text>
        <text x="24" y="76" fill="#475569" font-size="15">File, terminal, web,</text>
        <text x="24" y="98" fill="#475569" font-size="15">MCP connectors</text>
      </g>
      <g transform="translate(812 372)">
        <rect width="210" height="128" rx="22" fill="#fff7ed" stroke="#fdba74"/>
        <text x="24" y="44" fill="#0f172a" font-size="23" font-weight="800">Verifier</text>
        <text x="24" y="76" fill="#475569" font-size="15">Tests, checks,</text>
        <text x="24" y="98" fill="#475569" font-size="15">objective artifacts</text>
      </g>
      <g transform="translate(442 372)">
        <rect width="210" height="128" rx="22" fill="#fef2f2" stroke="#fca5a5"/>
        <text x="24" y="44" fill="#0f172a" font-size="23" font-weight="800">Human gate</text>
        <text x="24" y="76" fill="#475569" font-size="15">Approve, pause,</text>
        <text x="24" y="98" fill="#475569" font-size="15">or escalate</text>
      </g>
      <g transform="translate(72 372)">
        <rect width="210" height="128" rx="22" fill="#f8fafc" stroke="#cbd5e1"/>
        <text x="24" y="44" fill="#0f172a" font-size="23" font-weight="800">Report</text>
        <text x="24" y="76" fill="#475569" font-size="15">Only state changes,</text>
        <text x="24" y="98" fill="#475569" font-size="15">blockers, artifacts</text>
      </g>
    </g>

  </g>

  <g transform="translate(90 780)" font-family="DejaVu Sans">
    <text x="0" y="0" fill="#334155" font-size="17" font-weight="700">Completion means evidence, not just a cron trigger.</text>
    <text x="0" y="32" fill="#64748b" font-size="15">Use compact health artifacts for status. Keep full outputs for audit.</text>
  </g>
</svg>
