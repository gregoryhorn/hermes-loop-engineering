name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check loop example
        run: python scripts/loop_readiness.py templates/LOOP.example.md
      - name: Check state templates
        run: |
          python scripts/validate_loop_state.py templates/state.example.json
          python scripts/validate_loop_state.py templates/rnd-state.example.json
      - name: Check Python syntax
        run: python -m py_compile scripts/loop_readiness.py scripts/check_markdown_links.py scripts/validate_loop_state.py scripts/extract_cron_response.py
      - name: Check Markdown links
        run: python scripts/check_markdown_links.py .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Check installer syntax
        run: bash -n scripts/install-hermes-loop-skill.sh
