name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check loop example
        run: python scripts/loop_readiness.py templates/LOOP.example.md
      - name: Check installer syntax
        run: bash -n scripts/install-hermes-loop-skill.sh
